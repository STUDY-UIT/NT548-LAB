name: Run Tests

on:
  push:
    branches:
      - master
      - feat/helm
  pull_request:
    branches:
      - master

jobs:
  test-backend-user:
    name: Test Backend User
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend_User/package-lock.json

      - name: Install dependencies
        working-directory: ./backend_User
        run: npm install

      - name: Run linter
        working-directory: ./backend_User
        run: npm run lint --if-present

      # - name: Run tests
      #   working-directory: ./backend_User
      #   run: npm test

  test-backend-product:
    name: Test Backend Product
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven tests
        working-directory: ./backend_Product
        run: mvn clean test

  test-backend-order:
    name: Test Backend Order
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend_Order
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ./backend_Order
        run: |
          python -m pytest --verbose || echo "No tests found, skipping..."

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run linter
        working-directory: ./frontend
        run: npm run lint --if-present

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  test-docker-builds:
    name: Test Docker Builds
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Backend User 
        uses: docker/build-push-action@v4
        with:
          context: ./backend_User
          push: false

      - name: Build Backend Product 
        uses: docker/build-push-action@v4
        with:
          context: ./backend_Product
          push: false

      - name: Build Backend Order 
        uses: docker/build-push-action@v4
        with:
          context: ./backend_Order
          push: false

      - name: Build Frontend 
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: false

      - name: Build Gateway 
        uses: docker/build-push-action@v4
        with:
          context: ./gateway
          push: false

  helm-lint:
    name: Lint Helm Charts
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: Lint Helm Chart
        run: helm lint ./nt548-chart

      - name: Validate Helm Templates
        run: helm template ecommerce ./nt548-chart -n ecommerce
