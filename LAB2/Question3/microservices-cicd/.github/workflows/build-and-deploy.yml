name: Build & Deploy to EKS

on:
  push:
    branches:
      - master

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: 041659741748.dkr.ecr.ap-southeast-1.amazonaws.com
  EKS_CLUSTER_NAME: iac-dev-eks
  NAMESPACE: ecommerce

jobs:
  #####
  build-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      backend-user-tag: ${{ steps.meta-user.outputs.tags }}
      backend-product-tag: ${{ steps.meta-product.outputs.tags }}
      backend-order-tag: ${{ steps.meta-order.outputs.tags }}
      frontend-tag: ${{ steps.meta-frontend.outputs.tags }}
      gateway-tag: ${{ steps.meta-gateway.outputs.tags }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build & Push Backend User
        uses: docker/build-push-action@v4
        with:
          context: ./backend_User
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/ecommerce/backend-user:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Backend Product
        uses: docker/build-push-action@v4
        with:
          context: ./backend_Product
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/ecommerce/backend-product:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Backend Order
        uses: docker/build-push-action@v4
        with:
          context: ./backend_Order
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/ecommerce/backend-order:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/ecommerce/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Gateway
        uses: docker/build-push-action@v4
        with:
          context: ./gateway
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/ecommerce/gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-images
    permissions:
      id-token: write
      contents: read
    if: github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      # - name: Create namespace if not exists
      #   run: |
      #     kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      # - name: Clean up old backend-user-secret
      #   run: |
      #     kubectl delete secret backend-user-secret \
      #       -n ${{ env.NAMESPACE }} \
      #       --ignore-not-found=true || true

      - name: Deploy with Helm
        run: |
          helm upgrade -i ecommerce ./nt548-chart \
            -n ${{ env.NAMESPACE }} \
            --create-namespace \
            --set backendUser.secrets.DB_PASSWORD=${{ secrets.DB_PASSWORD_BACKEND_USER }} \
            --wait \
            --timeout 5m

      - name: Verify Deployment
        run: |
          kubectl -n ${{ env.NAMESPACE }} get pods
          kubectl -n ${{ env.NAMESPACE }} get svc
          kubectl -n ${{ env.NAMESPACE }} get ingress

      - name: Wait for Pods Ready
        run: |
          kubectl wait --for=condition=ready pod \
            -l app=user,app=product,app=order,app=gateway,app=frontend \
            -n ${{ env.NAMESPACE }} \
            --timeout=300s || echo "Some pods are not ready, but continuing..."
