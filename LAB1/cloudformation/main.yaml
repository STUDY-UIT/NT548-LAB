AWSTemplateFormatVersion: '2010-09-09'
Description: Root stack - NT548 Lab AWS Infrastructure

Parameters:

  ProjectName:
    Type: String
    Default: nt548-lab01

  VpcCidr:
    Type: String
    Default: 10.0.0.0/16

  PublicSubnetCidr:
    Type: String
    Default: 10.0.1.0/24

  PrivateSubnetCidr:
    Type: String
    Default: 10.0.2.0/24

  AvailabilityZone:
    Type: String
    Default: ap-southeast-1a

  MyIp:
    Type: String
    Description: Your public IP address (without /32) https://whatsmyip.com/
    Default: 0.0.0.0/0

  AmiId:
    Type: AWS::EC2::Image::Id
    Default: ami-0543dbdaf4e114be7
# or
  # AmiId:
  #   Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
  #   Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t3.micro
      
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Ten Key Pair da tao tren AWS Console

  TemplatesBucketUrl:
    Type: String
    Description: "S3 URL chua templates, Example: https://mybucket.s3.ap-southeast-1.amazonaws.com"

Resources:
  VpcStack:
    Type: AWS::CloudFormation::Stack
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TemplateURL:
        Fn::Sub: "${TemplatesBucketUrl}/templates/vpc.yaml"
      Parameters:
        ProjectName:
          Ref: ProjectName
        VpcCidr:
          Ref: VpcCidr
        PublicSubnetCidr:
          Ref: PublicSubnetCidr
        PrivateSubnetCidr:
          Ref: PrivateSubnetCidr
        AvailabilityZone:
          Ref: AvailabilityZone

  NatGatewayStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: VpcStack
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TemplateURL:
        Fn::Sub: "${TemplatesBucketUrl}/templates/nat_gateway.yaml"
      Parameters:
        ProjectName:
          Ref: ProjectName
        PublicSubnetID:
          Fn::GetAtt:
            - VpcStack
            - Outputs.PublicSubnetID

  RouteTableStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: NatGatewayStack
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TemplateURL:
        Fn::Sub: "${TemplatesBucketUrl}/templates/route_table.yaml"
      Parameters:
        ProjectName:
          Ref: ProjectName
        VpcID:
          Fn::GetAtt:
            - VpcStack
            - Outputs.VpcID
        PublicSubnetID:
          Fn::GetAtt:
            - VpcStack
            - Outputs.PublicSubnetID
        PrivateSubnetID:
          Fn::GetAtt:
            - VpcStack
            - Outputs.PrivateSubnetID
        InternetGatewayID:
          Fn::GetAtt:
            - VpcStack
            - Outputs.InternetGatewayID
        NatGatewayID:
          Fn::GetAtt:
            - NatGatewayStack
            - Outputs.NatGatewayID

  SecurityGroupStack:
    Type: AWS::CloudFormation::Stack
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TemplateURL:
        Fn::Sub: "${TemplatesBucketUrl}/templates/security_group.yaml"
      Parameters:
        ProjectName:
          Ref: ProjectName
        VpcID:
          Fn::GetAtt:
            - VpcStack
            - Outputs.VpcID
        MyIp:
          Ref: MyIp

  EC2Stack:
    Type: AWS::CloudFormation::Stack
    DependsOn: 
      - RouteTableStack
      - SecurityGroupStack
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TemplateURL:
        Fn::Sub: "${TemplatesBucketUrl}/templates/ec2.yaml"
      Parameters:
        ProjectName:
          Ref: ProjectName
        AmiId:
          Ref: AmiId
        InstanceType:
          Ref: InstanceType
        KeyName:
          Ref: KeyName
        PublicSubnetID:
          Fn::GetAtt:
            - VpcStack
            - Outputs.PublicSubnetID
        PrivateSubnetID:
          Fn::GetAtt:
            - VpcStack
            - Outputs.PrivateSubnetID
        PublicSGID:
          Fn::GetAtt:
            - SecurityGroupStack
            - Outputs.PublicSGID
        PrivateSGID:
          Fn::GetAtt:
            - SecurityGroupStack
            - Outputs.PrivateSGID

Outputs:
  VpcId:
    Description: VPC ID
    Value:
      Fn::GetAtt:
        - VpcStack 
        - Outputs.VpcID 

  PublicSubnet:
    Description: Public Subnet ID
    Value:
      Fn::GetAtt:
        - VpcStack 
        - Outputs.PublicSubnetID 

  PrivateSubnet:
    Description: Private Subnet ID
    Value:
      Fn::GetAtt:
        - VpcStack 
        - Outputs.PrivateSubnetID 

  PublicEC2IP:
    Description: IP Public de SSH
    Value:
      Fn::GetAtt:
        - EC2Stack
        - Outputs.PublicEC2IP
        
  PrivateEC2IP:
    Description: IP Private cua Private EC2
    Value:
      Fn::GetAtt:
        - EC2Stack
        - Outputs.PrivateEC2IP