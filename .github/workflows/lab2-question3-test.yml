name: Lab2 Question3 - Run Tests

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
    branches:
      - master
      - main
      - develop
  workflow_dispatch:

env:
  APP_DIR: LAB2/Question3/microservices-cicd

jobs:
  test-backend-user:
    name: Test Backend User
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/backend_User/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}/backend_User
        run: npm install

      - name: Run linter
        working-directory: ${{ env.APP_DIR }}/backend_User
        run: npm run lint --if-present

  test-backend-product:
    name: Test Backend Product
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Run Maven tests
        working-directory: ${{ env.APP_DIR }}/backend_Product
        run: mvn clean test

  test-backend-order:
    name: Test Backend Order
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}/backend_Order
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ${{ env.APP_DIR }}/backend_Order
        run: python -m pytest --verbose || echo "No tests found, skipping..."

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm install

      - name: Run linter
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm run lint --if-present

      - name: Build frontend
        working-directory: ${{ env.APP_DIR }}/frontend
        run: npm run build

  test-docker-builds:
    name: Test Docker Builds
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend User
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}/backend_User
          push: false

      - name: Build Backend Product
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}/backend_Product
          push: false

      - name: Build Backend Order
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}/backend_Order
          push: false

      - name: Build Frontend
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}/frontend
          push: false

      - name: Build Gateway
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}/gateway
          push: false

  helm-lint:
    name: Lint Helm Chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0

      - name: Lint Helm Chart
        run: helm lint ${{ env.APP_DIR }}/nt548-chart

      - name: Validate Helm Templates
        run: helm template ecommerce ${{ env.APP_DIR }}/nt548-chart -n ecommerce
