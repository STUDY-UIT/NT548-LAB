name: Lab2 Question3 - Build & Deploy to EKS

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  APP_DIR: LAB2/Question3/microservices-cicd
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: 041659741748.dkr.ecr.ap-southeast-1.amazonaws.com
  EKS_CLUSTER_NAME: iac-dev-eks
  NAMESPACE: ecommerce

jobs:
  build-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend User
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}/backend_User
          push: true
          tags: ${{ env.ECR_REGISTRY }}/ecommerce/backend-user:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Backend Product
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}/backend_Product
          push: true
          tags: ${{ env.ECR_REGISTRY }}/ecommerce/backend-product:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Backend Order
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}/backend_Order
          push: true
          tags: ${{ env.ECR_REGISTRY }}/ecommerce/backend-order:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}/frontend
          push: true
          tags: ${{ env.ECR_REGISTRY }}/ecommerce/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Gateway
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}/gateway
          push: true
          tags: ${{ env.ECR_REGISTRY }}/ecommerce/gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-images
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.28.0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Deploy with Helm
        run: |
          helm upgrade -i ecommerce ${{ env.APP_DIR }}/nt548-chart \
            -n ${{ env.NAMESPACE }} \
            --create-namespace \
            --set backendUser.secrets.DB_PASSWORD=${{ secrets.DB_PASSWORD_BACKEND_USER }} \
            --wait \
            --timeout 5m

      - name: Verify Deployment
        run: |
          kubectl -n ${{ env.NAMESPACE }} get pods
          kubectl -n ${{ env.NAMESPACE }} get svc
          kubectl -n ${{ env.NAMESPACE }} get ingress
