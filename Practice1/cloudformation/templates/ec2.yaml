AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 module - Public and Private EC2 instances

Parameters:

  ProjectName:
    Type: String

  AmiId:
    Type: AWS::EC2::Image::Id
    Default: ami-0df7a207adb9748c7

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t3.micro

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of existing EC2 Key Pair

  PublicSubnetID:
    Type: AWS::EC2::Subnet::Id

  PrivateSubnetID:
    Type: AWS::EC2::Subnet::Id

  PublicSGID:
    Type: AWS::EC2::SecurityGroup::Id

  PrivateSGID:
    Type: AWS::EC2::SecurityGroup::Id

Resources:
  # Public EC2
  PublicEC2:
    Type: AWS::EC2::Instance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      ImageId:
        Ref: AmiId
      InstanceType:
        Ref: InstanceType
      KeyName:
        Ref: KeyName
      SubnetId:
        Ref: PublicSubnetID
      SecurityGroupIds:
        - Ref: PublicSGID
      Tags:
        - Key: Name
          Value:
            Fn::Sub: "${ProjectName}-public-ec2"

  # Private EC2
  PrivateEC2:
    Type: AWS::EC2::Instance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      ImageId:
        Ref: AmiId
      InstanceType:
        Ref: InstanceType
      KeyName:
        Ref: KeyName
      SubnetId:
        Ref: PrivateSubnetID
      SecurityGroupIds:
        - Ref: PrivateSGID
      Tags:
        - Key: Name
          Value:
            Fn::Sub: "${ProjectName}-private-ec2"

Outputs:

  PublicEC2Id:
    Description: Public EC2 instance ID
    Value:
      Ref: PublicEC2

  PublicEC2IP:
    Description: Public IP to SSH into
    Value:
      Fn::GetAtt:
        - PublicEC2
        - PublicIp

  PrivateEC2Id:
    Description: Private EC2 instance ID
    Value:
      Ref: PrivateEC2

  PrivateEC2IP:
    Description: Private EC2 private IP
    Value:
      Fn::GetAtt:
        - PrivateEC2
        - PrivateIp